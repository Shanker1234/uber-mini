name: Uber mini Backend CI
on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build: 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Project
        run: mvn clean package -DskipTests

      - name: Build Docker Image
        run: docker build -t uber-mini .
      
      - name: Loginto Docker Hub
        uses: docker/login-action@v3
        with: 
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push docker Image
        run: |
          docker tag uber-mini ${{ secrets.DOCKER_USERNAME}}/uber-mini:latest
          docker push ${{secrets.DOCKER_USERNAME}}/uber-mini:latest