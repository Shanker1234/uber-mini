apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres
  namespace: uber-mini

spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: uber
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: uber-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: uber-secret
                  key: POSTGRES_PASSWORD
